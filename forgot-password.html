<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نسيت كلمة المرور - FaithPath</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">
    <div class="card fade">
      <div class="glow"></div>

      <div class="icon fade" style="--delay: 0ms;">
        <i class="fas fa-envelope-open-text"></i>
      </div>

      <p class="bismillah fade" style="--delay: 120ms;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
      <h1 class="fade" style="--delay: 220ms;">نسيت كلمة المرور؟</h1>
      <p class="hint" style="margin-bottom: 1.2rem;">أدخل بريدك الإلكتروني وسنرسل لك رمز إعادة التعيين.</p>

      <div id="messageContainer"></div>

      <form id="forgotPasswordForm" class="form fade" style="--delay: 320ms;">
        <div class="group">
          <span class="icon-prepend">
            <i class="fas fa-envelope"></i>
          </span>
          <label class="hidden" for="email">البريد الإلكتروني</label>
          <input type="email" id="email" name="email" class="field" placeholder="البريد الإلكتروني" autocomplete="email" required>
        </div>

        <div class="actions" style="margin-bottom: 0.8rem;">
          <button type="submit" class="btn primary" id="submitBtn">
            <span id="buttonText">إرسال رمز الاستعادة</span>
          </button>
        </div>
      </form>

      <div class="meta" style="margin-bottom: 0; justify-content: center;">
        <a class="link" href="start.html">العودة إلى تسجيل الدخول</a>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.protocol === 'file:'
      ? 'http://localhost/projet_web_2026/backend'
      : 'backend';

    const form = document.getElementById('forgotPasswordForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const buttonText = document.getElementById('buttonText');
    const messageContainer = document.getElementById('messageContainer');

    function showMessage(type, message) {
      const color = type === 'success' ? '#1d6b4a' : '#b42318';
      messageContainer.innerHTML = `<p class="hint" style="color:${color};font-weight:600;margin-bottom:1rem;">${message}</p>`;
    }

    function clearMessage() {
      messageContainer.innerHTML = '';
    }

    function setButtonLoading(isLoading) {
      submitBtn.disabled = isLoading;
      if (isLoading) {
        buttonText.textContent = 'جاري الإرسال...';
      } else {
        buttonText.textContent = 'إرسال رمز الاستعادة';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      const email = emailInput.value.trim();

      if (!email) {
        showMessage('error', 'يرجى إدخال بريدك الإلكتروني.');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMessage('error', 'البريد الإلكتروني غير صحيح.');
        return;
      }

      setButtonLoading(true);

      try {
        const response = await fetch(`${API_URL}/forgot.php`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
          },
          body: JSON.stringify({ email, mode: 'code' }),
        });

        const raw = await response.text();
        let data = {};
        try {
          data = JSON.parse(raw);
        } catch (err) {
          data = { success: false, message: 'استجابة غير صالحة من الخادم.' };
        }

        if (response.ok && data.success) {
          showMessage('success', data.message || 'تم إرسال رمز الاستعادة بنجاح.');

          setTimeout(() => {
            window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
          }, 2000);
        } else {
          showMessage('error', data.message || 'حدث خطأ. حاول مجددا.');
        }
      } catch (error) {
        showMessage('error', 'تعذر الاتصال بالخادم. تأكد من تشغيل Apache/XAMPP وفتح الموقع عبر http://localhost/projet_web_2026/');
      } finally {
        setButtonLoading(false);
      }
    });
  </script>
</body>
</html>
