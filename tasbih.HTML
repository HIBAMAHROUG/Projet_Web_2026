<!doctype html>
<html lang="ar" dir="rtl">
  <!--dir?-->
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <!--comprendre-->
    <title>المسبحة الإلكترونية</title>
    <link rel="stylesheet" href="style1.css" />
  </head>

  <body>
    <div class="app">
      <div class="tasbih-header">
        <h1>📿 المسبحة الإلكترونية</h1>
        <p>اذكر الله يطمئن قلبك 🤍</p>
      </div>

      <div class="tasbih-container">
        <div class="tasbih">
          <div class="circle" id="circle"></div>
          <div class="center">
            <div id="zikr">سبحان الله</div>
            <div class="count" id="count">0</div>
          </div>
        </div>

        <!-- INDICATEUR DE PROGRESSION -->
        <div class="progress-indicator">
          <div class="progress-bar-bg">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-text" id="progressText">0 / 33</div>
        </div>
      </div>

      <div class="controls">
        <div class="btn-group">
          <button onclick="changeZikr()" class="primary">🔄 تغيير الذكر</button>
          <button onclick="reset()">🗑️ إعادة</button>
        </div>

        <div class="selector-group">
          <label for="maxSelect">🎯 الحد الأقصى:</label>
          <select id="maxSelect" name="maxx" onchange="changeMax()">
            <option value="33">33</option>
            <option value="99">99</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>
    </div>
    <script src="tasbih.js"></script>
  </body>
</html>
