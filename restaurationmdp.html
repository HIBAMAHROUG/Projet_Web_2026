<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FaithPath · استعادة كلمة المرور</title>
  <!-- Bootstrap 5 RTL (النسخة العربية) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <!-- Font Awesome 6 (أيقونات إبداعية) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- ربط ملف CSS المنفصل (نفس ملف start.css أو يمكن تخصيصه) -->
  <link rel="stylesheet" href="restaurationmdp.css">
  <!-- إضافات صغيرة خاصة بصفحة استعادة كلمة المرور (اختياري) -->
  <style>
    /* يمكن وضع أي تعديلات طفيفة هنا إذا لزم الأمر، لكننا نعتمد على start.css */
    .instruction-note {
      background: rgba(207, 226, 213, 0.3);
      border-right: 4px solid var(--emerald-600);
      padding: 0.8rem 1rem;
      border-radius: 12px;
      font-size: 0.98rem;
      color: #2e2a28;
      margin-bottom: 1.8rem;
    }
    
    .back-to-login {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--emerald-700);
      text-decoration: none;
      font-weight: 600;
      margin-top: 1rem;
      transition: color 0.2s;
    }
    
    .back-to-login:hover {
      color: var(--emerald-900);
      text-decoration: underline;
    }
    
    .back-to-login i {
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <!-- بطاقة الهوية الرئيسية - تصميم مستوحى من البساطة والروحانية -->
  <div class="faith-container">
    <div class="faith-card fade-stagger">
      <div class="card-aura"></div>

      <!-- شعار دائري واسم المسجد -->
      <div class="brand-circle fade-item" style="--delay: 0ms;">
        <i class="fas fa-mosque"></i>
      </div>
      <p class="bismillah fade-item" style="--delay: 120ms;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
      <h1 class="fade-item" style="--delay: 220ms;">اسْتَغْفِرُوا رَبَّكُمْ</h1>
      <p class="welcome-text fade-item" style="--delay: 420ms;">لا تَحْزَنْ إِنَّ اللَّهَ مَعَنَا</p>

      <!-- نموذج استعادة كلمة المرور -->
      <form class="login-form fade-item" style="--delay: 520ms;" aria-label="استعادة كلمة المرور">
        
        <!-- رسالة توضيحية -->
        <div class="instruction-note">
          <i class="fas fa-envelope-open-text me-2" style="color: var(--emerald-700);"></i>
          أدخل بريدك الإلكتروني وسنرسل لك رابطًا لإعادة تعيين كلمة المرور.
        </div>
        
        <!-- حقل البريد الإلكتروني -->
        <div class="input-group input-group-creative mb-4">
          <span class="input-group-text bg-transparent border-0" id="email-addon">
            <i class="fas fa-envelope" aria-hidden="true"></i>
          </span>
          <label class="visually-hidden" for="reset-email">البريد الإلكتروني</label>
          <input id="reset-email" name="email" type="email" class="form-control" placeholder="بريدك الإلكتروني" autocomplete="email" required>
        </div>

        <!-- أزرار الإرسال والعودة -->
        <div class="d-flex gap-3 mb-4">
          <button class="btn btn-primary flex-grow-1 btn-creative" type="submit">إرسال رابط الاستعادة</button>
        </div>
        
        <!-- رابط العودة لتسجيل الدخول -->
        <div class="text-center">
          <a href="start.html" class="back-to-login">
            <i class="fas fa-arrow-right"></i>
            العودة إلى صفحة تسجيل الدخول
          </a>
        </div>
      </form>

      <div class="human-note fade-item" style="--delay: 640ms;">
        <i class="fas fa-hands-praying"></i>
        <span>وَمَن يَتَّقِ اللَّهَ يَجْعَل لَّهُ مَخْرَجًا</span>
      </div>

      <!-- تذكير باسم الموقع (faithpath) بشكل إبداعي -->
      <div class="faithpath-signature fade-item" style="--delay: 740ms;">
        <span class="faithpath-icon"><i class="fas fa-circle-nodes"></i></span>
        <span class="faithpath-text">faithpath</span>
        <span class="faithpath-icon"><i class="fas fa-circle-nodes"></i></span>
      </div>

      <!-- عناصر زخرفية بسيطة (طبقات خلفية) -->
      <div class="flourish flourish-1"></div>
      <div class="flourish flourish-2"></div>
    </div>
  </div>
</body>
</html>
