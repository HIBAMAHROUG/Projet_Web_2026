<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>FaithPath · فيثبات · إنشاء حساب</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
	<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="signup-container" id="signup">
	<div class="signup-card fade-stagger">
		<div class="card-aura"></div>

		<div class="brand-circle fade-item" style="--delay: 0ms;">
			<i class="fas fa-mosque"></i>
		</div>
		<p class="bismillah fade-item" style="--delay: 120ms;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
		<h1 class="brand-title fade-item" style="--delay: 220ms;">وَمَا تَوْفِيقِي إِلَّا بِاللَّهِ</h1>
		<p class="brand-subtitle fade-item" style="--delay: 320ms;">إنشاء حساب جديد</p>

		<form class="signup-form fade-item" style="--delay: 420ms;" aria-label="إنشاء حساب">
			<div class="input-wrapper">
				<i class="fas fa-user input-icon" aria-hidden="true"></i>
				<label class="visually-hidden" for="fullname">الاسم الكامل</label>
				<input id="fullname" name="fullname" type="text" class="form-control" placeholder="الاسم الكامل" autocomplete="name" required>
			</div>
			<div class="input-wrapper">
				<i class="fas fa-envelope input-icon" aria-hidden="true"></i>
				<label class="visually-hidden" for="signup-email">البريد الإلكتروني</label>
				<input id="signup-email" name="email" type="email" class="form-control" placeholder="البريد الإلكتروني" autocomplete="email" required>
			</div>
			<div class="input-wrapper">
				<i class="fas fa-lock input-icon" aria-hidden="true"></i>
				<label class="visually-hidden" for="signup-password">كلمة المرور</label>
				<input id="signup-password" name="password" type="password" class="form-control" placeholder="كلمة المرور" autocomplete="new-password" required>
			</div>
			<div class="input-wrapper">
				<i class="fas fa-lock input-icon" aria-hidden="true"></i>
				<label class="visually-hidden" for="confirm-password">تأكيد كلمة المرور</label>
				<input id="confirm-password" name="confirm-password" type="password" class="form-control" placeholder="تأكيد كلمة المرور" autocomplete="new-password" required>
			</div>
			<button class="btn-signup w-100" type="submit">إنشاء حساب</button>
			<div class="toggle-link">
				لديك حساب بالفعل؟ <a href="start.html">تسجيل الدخول</a>
			</div>
		</form>

		<div class="human-note fade-item" style="--delay: 540ms;">
			<i class="fas fa-hands-praying"></i>
			<span>إنَّ لِأَهْلِ الذِّكْرِ غَنَائِمَ لا يَنَالُهَا نَائِمٌ</span>
		</div>

		<div class="faithpath-signature fade-item" style="--delay: 640ms;">
			<span class="faithpath-icon"><i class="fas fa-circle-nodes"></i></span>
			<span class="faithpath-text">faithpath</span>
			<span class="faithpath-icon"><i class="fas fa-circle-nodes"></i></span>
		</div>

		<div class="flourish flourish-1"></div>
		<div class="flourish flourish-2"></div>
	</div>
</div>

<script>
	const signupForm = document.querySelector('.signup-form');

	if (signupForm) {
		signupForm.addEventListener('submit', (event) => {
			event.preventDefault();

			const fullNameInput = document.getElementById('fullname');
			const emailInput = document.getElementById('signup-email');
			const passwordInput = document.getElementById('signup-password');
			const confirmPasswordInput = document.getElementById('confirm-password');

			const fullName = fullNameInput.value.trim();
			const email = emailInput.value.trim().toLowerCase();
			const password = passwordInput.value;
			const confirmPassword = confirmPasswordInput.value;

			if (!fullName || !email || !password || !confirmPassword) {
				alert('يرجى تعبئة جميع الحقول.');
				return;
			}

			if (password !== confirmPassword) {
				alert('كلمتا المرور غير متطابقتين.');
				return;
			}

			const accounts = JSON.parse(localStorage.getItem('faithpathAccounts') || '[]');
			const existingAccount = accounts.find((account) => account.email === email);

			if (existingAccount) {
				alert('هذا البريد الإلكتروني مستخدم بالفعل.');
				return;
			}

			accounts.push({
				fullName,
				email,
				password
			});

			localStorage.setItem('faithpathAccounts', JSON.stringify(accounts));
			alert('تم إنشاء الحساب بنجاح.');
			window.location.href = 'start.html';
		});
	}
</script>

</body>
</html>
