<!doctype html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>أنبياء الإسلام</title>
    <link rel="stylesheet" href="styleaxe.css" />
  </head>
  <body>
    <!doctype html>
    <html lang="ar" dir="rtl">
      <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Header FaithPath</title>

        <!-- Font -->
        <link
          href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600&display=swap"
          rel="stylesheet"
        />

        <!-- Icons -->
        <link
          rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />

        <link rel="stylesheet" href="styleaxe.css" />
      </head>

      <body>
        <header class="header">
          <div class="logo">
            <span class="logo-text">Faith<span>Path</span></span>
            <i class="fa-solid fa-mosque"></i>
          </div>

          <!-- NAVBAR CENTRE -->
          <nav class="navbar">
            <a href="#">الرئيسية</a>
            <a href="#">القرآن الكريم</a>
            <a href="#">أسماء الله الحسنى</a>
            <a href="#">التقويم الهجري</a>
            <a href="#">المسبحة الإلكترونية</a>
            <a href="#">قصة الصحابة</a>
            <a href="#">حاسب نفسك</a>
            <a href="#">صدقة جارية</a>
            <a href="#">أذكار</a>
            <a href="#">اتصل بنا</a>
          </nav>

          <div class="user-box">
            <i class="fa-solid fa-bell"></i>

            <div class="search-box">
              <input type="text" placeholder="...بحث" />
              <i class="fa-solid fa-search"></i>
            </div>

            <div class="user">
              <i class="fa-solid fa-user"></i>
              <span>المستخدم</span>
            </div>
          </div>
        </header>

        <div class="container">
          <div class="header">
            <h1 class="title-center">أنبياء الإسلام</h1>
            <br />
          </div>
          <div>
            <br /><br />
            <h2 style="text-align: center">
              خمسة وعشرون نبيًّا ذُكروا في القرآن الكريم
            </h2>
          </div>
          <br />
          <div class="search-section">
            <div class="search-box">
              <input type="text" id="searchInput" placeholder="🔍ابحث هنا" />
            </div>
            <div class="filter-buttons">
              <button class="filter-btn active" data-filter="all">
                📖 الجميع
              </button>
              <button class="filter-btn" data-filter="ululazm">
                ⭐ أولو العزم
              </button>
              <button class="filter-btn" data-filter="early">
                🕋 الأنبياء الأوائل
              </button>
            </div>
          </div>

          <div class="prophets-grid" id="prophetsGrid"></div>
        </div>

        <!-- Modal détails -->
        <div class="modal" id="modal">
          <div class="modal-content">
            <div class="modal-header">
              <button class="close-modal" id="closeModal">✕</button>
              <div class="modal-prophet-name" id="modalNameAr"></div>
            </div>
            <div class="modal-body" id="modalBody"></div>
          </div>
        </div>
        <script src="xe.js"></script>
      </body>
    </html>
  </body>
</html>
