<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فيث باث · الأذكار</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700;900&family=Cairo:wght@300;400;600;700;900&family=Noto+Kufi+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="athkar.css">
</head>
<body class="page-category">

  <!-- ═══ EN-TÊTE SOBRE (pas de navbar, pas de menu) ══════════ -->
  <header class="cat-header">
    <div class="cat-header-inner">
      <a href="adhkar.html" class="cat-back-btn">
        <i class="fas fa-arrow-right"></i>
        <span>العودة للأقسام</span>
      </a>
      <div class="cat-header-title">
        <div class="cat-header-icon" id="catHeaderIcon">🤲</div>
        <div>
          <div class="cat-header-label">أذكار اليوم والليلة</div>
          <h1 class="cat-header-name" id="catHeaderName"></h1>
        </div>
      </div>
      <a href="page_acceuil.html" class="cat-home-btn">
        <i class="fas fa-house"></i>
      </a>
    </div>
  </header>

  <!-- ═══ CONTENU ════════════════════════════════════════════ -->
  <main class="cat-main">
    <div class="container">

      <!-- Sous-titre de catégorie -->
      <div class="cat-section-header">
        <div class="section-icon">
          <i class="fas fa-hands-praying"></i>
        </div>
        <h2 class="section-title" id="categoryTitle"></h2>
        <p class="section-subtitle" id="categorySubtitle"></p>
        <div class="athkar-count" id="athkarCount"></div>
      </div>

      <!-- Barre de filtrage + recherche -->
      <div class="athkar-filter-bar">
        <div class="filter-search">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInputFilter" placeholder="ابحث عن ذكر...">
        </div>
      </div>

      <!-- Grille des athkar → injectée par AthkarCategory.js -->
      <div class="athkar-grid" id="athkarGrid"></div>

      <!-- Compteur personnel -->
      <div class="personal-counter">
        <div class="counter-header">
          <i class="fas fa-hand-sparkles"></i>
          <span>عَدَّادُ الْأَذْكَارِ الشَّخْصِيُّ</span>
        </div>
        <div class="counter-body">
          <div class="counter-display">
            <span id="personalCounter">٠</span>
          </div>
          <div class="counter-controls">
            <button class="counter-btn" id="counterPlus"><i class="fas fa-plus"></i></button>
            <button class="counter-btn" id="counterMinus"><i class="fas fa-minus"></i></button>
            <button class="counter-reset" id="counterReset">
              <i class="fas fa-undo-alt"></i> إعادة ضبط
            </button>
          </div>
        </div>
        <div class="counter-presets">
          <button class="preset-preset" data-value="33">٣٣</button>
          <button class="preset-preset" data-value="34">٣٤</button>
          <button class="preset-preset" data-value="100">١٠٠</button>
        </div>
      </div>

    </div>
  </main>

  <!-- ═══ FOOTER SOBRE ════════════════════════════════════════ -->
  <footer class="cat-footer">
    <div class="cat-footer-inner">
      <span>© 2026 FaithPath · جميع الحقوق محفوظة</span>
      <span class="cat-footer-sep">·</span>
      <i class="fas fa-star cat-footer-star"></i>
      <span>وَرَتِّلِ الْقُرْآنَ تَرْتِيلًا</span>
      <i class="fas fa-star cat-footer-star"></i>
    </div>
  </footer>

  <script src="adhkarCategory.js"></script>
</body>
</html>
