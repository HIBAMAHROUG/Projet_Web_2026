<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - FaithPath</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style/styles.css">
</head>
<body class="auth-plain">
  <div class="wrapper">
      <div class="card fade">
        <div class="glow"></div>

        <div class="icon fade" style="--delay: 0ms;">
          <i class="fas fa-mosque"></i>
        </div>

        <p class="bismillah fade" style="--delay: 120ms;">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</p>
        <h1 class="fade" style="--delay: 220ms;">فَاذْكُرُونِي أَذْكُرْكُمْ</h1>

        <form class="form fade" style="--delay: 520ms;">
          <div class="group">
            <span class="icon-prepend">
              <i class="fas fa-envelope"></i>
            </span>
            <label class="hidden" for="email">البريد الإلكتروني</label>
            <input id="email" type="text" class="field" placeholder="البريد الإلكتروني" autocomplete="username" required>
          </div>

          <div class="group">
            <span class="icon-prepend">
              <i class="fas fa-lock"></i>
            </span>
            <label class="hidden" for="password">كلمة المرور</label>
            <input id="password" type="password" class="field" placeholder="كلمة المرور" autocomplete="current-password" required>
          </div>

          <p class="hint">سجّل الدخول باستخدام حسابك المعتاد.</p>

          <div class="meta">
            <div class="check">
              <input class="checkbox" type="checkbox" id="remember">
              <label class="check-label" for="remember">تذكرني</label>
            </div>
            <a class="link" href="forgot-password.html">نسيت كلمة المرور؟</a>
          </div>

          <div class="actions">
            <button class="btn primary" type="submit">تسجيل الدخول</button>
            <a href="signup.html" class="btn secondary">إنشاء حساب</a>
          </div>
        </form>

        <div class="note fade" style="--delay: 640ms;">
          <i class="fas fa-hands-praying"></i>
          <span>عُدْ إلى الله... يعود لك كلّ شيء.</span>
        </div>

        <div class="signature fade" style="--delay: 740ms;">
          <span class="sig-icon"><i class="fas fa-circle-nodes"></i></span>
          <span class="sig-text">faithpath</span>
          <span class="sig-icon"><i class="fas fa-circle-nodes"></i></span>
        </div>

        <div class="decor decor-1"></div>
        <div class="decor decor-2"></div>
      </div>
  </div>

  <script>
    function getProjectBaseUrl() {
      const marker = '/projet_web_2026/';
      const path = window.location.pathname || '';
      const idx = path.indexOf(marker);

      if (idx !== -1) {
        return window.location.origin + '/projet_web_2026';
      }

      return 'http://localhost/projet_web_2026';
    }

    const API_URL = `${getProjectBaseUrl()}/backend`;
    const loginForm = document.querySelector('.form');

    if (loginForm) {
      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const emailValue = emailInput.value.trim().toLowerCase();
        const passwordValue = passwordInput.value;

        if (!emailValue || !passwordValue) {
          alert('يرجى إدخال البريد الإلكتروني وكلمة المرور.');
          return;
        }

        try {
          const response = await fetch(`${API_URL}/login.php`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json'
            },
            body: JSON.stringify({ email: emailValue, password: passwordValue })
          });

          const raw = await response.text();
          let data = {};
          try {
            data = JSON.parse(raw);
          } catch (e) {
            data = { success: false, message: 'استجابة غير صالحة من الخادم.' };
          }

          if (!response.ok || !data.success) {
            alert(data.message || 'تعذر تسجيل الدخول.');
            return;
          }

          localStorage.setItem('faithpathCurrentUser', JSON.stringify({
            fullName: data.user?.fullName || '',
            email: data.user?.email || emailValue
          }));

          window.location.href = 'page_acceuil.html';
        } catch (error) {
          alert('تعذر الاتصال بالخادم. افتح الموقع عبر http://localhost/projet_web_2026/start.html وتأكد أن Apache يعمل.');
        }
      });
    }
  </script>
</body>
</html>
