<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil utilisateur</title>
  <link rel="stylesheet" href="style/styles.css">
</head>
<body>
  <div class="wrapper">
    <h1>Profil utilisateur</h1>
    <div id="profileInfo">Chargement...</div>
    <a href="page_acceuil.html">Retour à l'accueil</a>
  </div>
  <script>
    // Récupère le nom d'utilisateur depuis l'URL
    function getQueryParam(name) {
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }
    const username = getQueryParam('username');
    if (!username) {
      document.getElementById('profileInfo').textContent = 'Aucun utilisateur spécifié.';
    } else {
      fetch('../backend/profile.php?username=' + encodeURIComponent(username))
        .then(r => r.json())
        .then(data => {
          if (data.success) {
            const p = data.profile;
            document.getElementById('profileInfo').innerHTML = `
              <ul>
                <li><b>Nom d'utilisateur :</b> ${p.username}</li>
                <li><b>Nom complet :</b> ${p.fullname}</li>
                <li><b>Email :</b> ${p.email}</li>
                <li><b>Rôle :</b> ${p.role}</li>
                <li><b>Date d'inscription :</b> ${p.joined}</li>
              </ul>
            `;
          } else {
            document.getElementById('profileInfo').textContent = data.error;
          }
        })
        .catch(() => {
          document.getElementById('profileInfo').textContent = 'Erreur lors du chargement du profil.';
        });
    }
  </script>
</body>
</html>
