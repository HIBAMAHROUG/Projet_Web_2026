<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>????? ????? ???? ?????? - FaithPath</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">
    <div class="card fade">
      <div class="glow"></div>

      <div class="icon fade" style="--delay: 0ms;">
        <i class="fas fa-key"></i>
      </div>

      <p class="bismillah fade" style="--delay: 100ms;">?????? ??????? ???????????? ??????????</p>
      <h1 class="fade" style="--delay: 180ms;">????? ????? ???? ??????</h1>

      <div id="loadingState" class="form fade" style="--delay: 260ms; text-align:center;">
        <p class="hint" style="margin: 0;">???? ?????? ?? ??????...</p>
      </div>

      <div id="errorState" class="form" style="display:none;">
        <div id="errorMessage" class="hint" style="margin-bottom:1rem;"></div>
        <div class="actions" style="margin-bottom:0;">
          <a href="start.html" class="btn primary">?????? ??? ????? ??????</a>
        </div>
      </div>

      <div id="formState" class="form" style="display:none;">
        <p id="userEmail" class="hint" style="margin-bottom: 1rem;"></p>
        <div id="messageContainer"></div>

        <form id="resetPasswordForm">
          <div id="codeAuthFields">
            <div class="group">
              <span class="icon-prepend">
                <i class="fas fa-envelope"></i>
              </span>
              <label class="hidden" for="email">?????? ??????????</label>
              <input type="email" id="email" name="email" class="field" placeholder="?????? ??????????" autocomplete="email">
            </div>

            <div class="group">
              <span class="icon-prepend">
                <i class="fas fa-shield-alt"></i>
              </span>
              <label class="hidden" for="code">??? ??????</label>
              <input type="text" id="code" name="code" class="field" placeholder="??? ?????? (6 ?????)" inputmode="numeric" maxlength="6">
            </div>
          </div>

          <div class="group">
            <span class="icon-prepend">
              <i class="fas fa-lock"></i>
            </span>
            <label class="hidden" for="password">???? ?????? ???????</label>
            <input type="password" id="password" name="password" class="field" placeholder="???? ?????? ???????" minlength="8" required>
          </div>

          <div class="group">
            <span class="icon-prepend">
              <i class="fas fa-check"></i>
            </span>
            <label class="hidden" for="confirmPassword">????? ???? ??????</label>
            <input type="password" id="confirmPassword" name="confirmPassword" class="field" placeholder="????? ???? ??????" minlength="8" required>
          </div>

          <p class="hint">??? ?? ???? ???? ?????? 8 ???? ??? ?????.</p>

          <div class="actions" style="margin-bottom:0;">
            <button type="submit" class="btn primary" id="submitBtn">??? ???? ??????</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.protocol === 'file:'
      ? 'http://localhost/projet_web_2026/backend'
      : 'backend';
    let resetToken = null;
    let prefilledEmail = '';

    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const formState = document.getElementById('formState');
    const form = document.getElementById('resetPasswordForm');
    const submitBtn = document.getElementById('submitBtn');
    const messageContainer = document.getElementById('messageContainer');
    const codeAuthFields = document.getElementById('codeAuthFields');
    const emailInput = document.getElementById('email');
    const codeInput = document.getElementById('code');

    function getTokenFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('token');
    }

    function getEmailFromURL() {
      const params = new URLSearchParams(window.location.search);
      return (params.get('email') || '').trim();
    }

    function showError(message) {
      loadingState.style.display = 'none';
      formState.style.display = 'none';
      errorState.style.display = 'block';
      document.getElementById('errorMessage').textContent = message;
    }

    function showMessage(type, message) {
      const color = type === 'success' ? '#1d6b4a' : '#b42318';
      messageContainer.innerHTML = `<p class="hint" style="margin-bottom:1rem;color:${color};font-weight:600;">${message}</p>`;
    }

    async function verifyToken() {
      resetToken = getTokenFromURL();
      if (!resetToken) {
        loadingState.style.display = 'none';
        errorState.style.display = 'none';
        formState.style.display = 'block';
        document.getElementById('userEmail').textContent = '???? ?????? ?????????? ?????? ?????? ????.';

        emailInput.required = true;
        codeInput.required = true;

        prefilledEmail = getEmailFromURL();
        if (prefilledEmail) {
          emailInput.value = prefilledEmail;
        }

        return;
      }

      codeAuthFields.style.display = 'none';
      emailInput.required = false;
      codeInput.required = false;

      try {
        const response = await fetch(`${API_URL}/reset.php?validate=1&token=${encodeURIComponent(resetToken)}`, {
          headers: { 'Accept': 'application/json' }
        });
        const raw = await response.text();
        let data = {};
        try {
          data = JSON.parse(raw);
        } catch (e) {
          data = { success: false, message: '??????? ??? ????? ?? ??????.' };
        }

        if (response.ok && data.success) {
          loadingState.style.display = 'none';
          formState.style.display = 'block';
          document.getElementById('userEmail').textContent = `??????: ${data.email}`;
        } else {
          showError(data.message || '?????? ????? ???????? ?? ??? ????.');
        }
      } catch (error) {
        showError('???? ??????? ???????. ???? ?? ????? Apache/XAMPP ???? ?????? ??? http://localhost/projet_web_2026/');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (password !== confirmPassword) {
        showMessage('error', '????? ?????? ??? ?????????.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '???? ?????...';

      try {
        const payload = { password, confirmPassword };

        if (resetToken) {
          payload.token = resetToken;
        } else {
          const email = emailInput.value.trim();
          const code = codeInput.value.trim();

          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            showMessage('error', '???? ????? ???? ???????? ????.');
            submitBtn.disabled = false;
            submitBtn.textContent = '??? ???? ??????';
            return;
          }

          if (!/^\d{6}$/.test(code)) {
            showMessage('error', '???? ????? ??? ????? ?? 6 ?????.');
            submitBtn.disabled = false;
            submitBtn.textContent = '??? ???? ??????';
            return;
          }

          payload.email = email;
          payload.code = code;
        }

        const response = await fetch(`${API_URL}/reset.php`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json'
          },
          body: JSON.stringify(payload)
        });
        const raw = await response.text();
        let data = {};
        try {
          data = JSON.parse(raw);
        } catch (e) {
          data = { success: false, message: '??????? ??? ????? ?? ??????.' };
        }

        if (response.ok && data.success) {
          showMessage('success', '?? ????? ???? ?????? ?????. ???? ?????? ????? ??????.');
          setTimeout(() => {
            window.location.href = 'start.html';
          }, 1800);
        } else {
          showMessage('error', data.message || '??? ??? ????? ???????.');
          submitBtn.disabled = false;
          submitBtn.textContent = '??? ???? ??????';
        }
      } catch (error) {
        showMessage('error', '???? ??????? ???????. ???? ?? ????? Apache/XAMPP ???? ?????? ??? http://localhost/projet_web_2026/');
        submitBtn.disabled = false;
        submitBtn.textContent = '??? ???? ??????';
      }
    });

    window.addEventListener('DOMContentLoaded', verifyToken);
  </script>
</body>
</html>
