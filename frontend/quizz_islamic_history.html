<script>
const QUESTIONS=[
{q:"في أي عام بدأت الدولة الأموية؟",o:["40هـ","41هـ","61هـ","132هـ"],a:1},
{q:"من هو مؤسس الدولة العباسية؟",o:["أبو جعفر المنصور","السفاح","هارون الرشيد","المأمون"],a:1},
{q:"في أي عام فتح المسلمون الأندلس؟",o:["711م","622م","732م","800م"],a:0},
{q:"من قاد جيش المسلمين في معركة القادسية؟",o:["خالد بن الوليد","عمرو بن العاص","سعد بن أبي وقاص","عقبة بن نافع"],a:2},
{q:"ما اسم عاصمة الدولة العباسية؟",o:["دمشق","مكة","بغداد","القاهرة"],a:2},
{q:"في أي عام سقطت الخلافة العباسية على يد المغول؟",o:["1258م","1300م","1453م","1200م"],a:0},
{q:"من قاد فتح مصر؟",o:["خالد بن الوليد","عمرو بن العاص","سعد بن أبي وقاص","طارق بن زياد"],a:1},
{q:"في أي عام فتح صلاح الدين الأيوبي القدس؟",o:["1099م","1187م","1250م","1300م"],a:1},
{q:"من هو الخليفة الراشدي الثالث؟",o:["عمر","علي","عثمان","أبو بكر"],a:2},
{q:"في أي عام فتح السلطان محمد الفاتح القسطنطينية؟",o:["1453م","1258م","1300م","1500م"],a:0},
{q:"من أسس الدولة الفاطمية؟",o:["عبيد الله المهدي","صلاح الدين","المعز لدين الله","العزيز بالله"],a:0},
{q:"من قاد فتح الأندلس عبر البحر؟",o:["موسى بن نصير","عقبة بن نافع","طارق بن زياد","خالد بن الوليد"],a:2},
{q:"ما اسم أول مسجد بُني في الإسلام؟",o:["مسجد قباء","المسجد النبوي","المسجد الأقصى","المسجد الحرام"],a:0},
{q:"كم سنة دامت الخلافة الراشدة؟",o:["20","30","40","50"],a:1},
{q:"من بنى مدينة القيروان في تونس؟",o:["موسى بن نصير","عقبة بن نافع","طارق بن زياد","حسان بن النعمان"],a:1},
{q:"ما اسم عاصمة الدولة الأموية؟",o:["بغداد","القاهرة","دمشق","المدينة"],a:2},
{q:"في أي عام وقعت معركة بدر الكبرى؟",o:["1هـ","2هـ","3هـ","4هـ"],a:1},
{q:"من هو أول من دوّن الحديث النبوي رسمياً؟",o:["ابن شهاب الزهري","مالك بن أنس","البخاري","ابن حنبل"],a:0},
{q:"ما اسم معركة انتصار المسلمين على الروم؟",o:["اليرموك","القادسية","نهاوند","بدر"],a:0},
{q:"كم خليفة راشد حكم الإسلام؟",o:["3","4","5","6"],a:1}
];
let cq=[],ci=0,sc=0,wc=0,toc=0,ans=false,ti=null,tl=20,ua=[];
const C=2*Math.PI*27;
function shuf(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function startQuiz(){cq=shuf(QUESTIONS).slice(0,20);ci=0;sc=0;wc=0;toc=0;ua=[];document.getElementById("qtot").textContent=cq.length;show("sq");loadQ();}
function loadQ(){
  const q=cq[ci];ans=false;
  document.getElementById("qcur").textContent=ci+1;document.getElementById("scr").textContent=sc;document.getElementById("wrg").textContent=wc;
  document.getElementById("pb").style.width=((ci/cq.length)*100)+"%";
  document.getElementById("qnum").textContent="السؤال "+(ci+1);document.getElementById("qtxt").textContent=q.q;
  document.getElementById("ft").className="ft";document.getElementById("crv").className="cr";document.getElementById("nb").style.display="none";
  const L=["أ","ب","ج","د"];const sh=shuf(q.o.map((t,i)=>({t,i})));
  const g=document.getElementById("og");g.innerHTML="";
  sh.forEach((op,p)=>{const b=document.createElement("button");b.className="ob";b.innerHTML='<span class="ol">'+L[p]+'</span><span>'+op.t+'</span>';b.dataset.orig=op.i;b.onclick=()=>selA(b,op.i,q.a);g.appendChild(b);});
  startT();
}
function startT(){clearInterval(ti);tl=20;updT(20);document.getElementById("trr").classList.remove("danger");ti=setInterval(()=>{tl--;updT(tl);if(tl<=5)document.getElementById("trr").classList.add("danger");if(tl<=0){clearInterval(ti);timeout();}},1000);}
function updT(t){document.getElementById("ttxt").textContent=t;document.getElementById("tfc").style.strokeDashoffset=C*(1-t/20);}
function timeout(){if(ans)return;ans=true;toc++;const q=cq[ci];document.querySelectorAll(".ob").forEach(b=>{b.disabled=true;if(parseInt(b.dataset.orig)===q.a)b.classList.add("correct");});ua.push({q:q.q,u:null,c:q.o[q.a],ok:false,to:true});toast(false,"⏰ انتهى الوقت! حاول متفوتش عشرين ثانية.");reveal(q.o[q.a]);showNxt(ci===cq.length-1);}
function selA(b,ch,ca){if(ans)return;ans=true;clearInterval(ti);const q=cq[ci];const ok=ch===ca;document.querySelectorAll(".ob").forEach(btn=>{btn.disabled=true;if(parseInt(btn.dataset.orig)===ca)btn.classList.add("correct");else if(btn===b&&!ok)btn.classList.add("wrong");});if(ok){sc++;toast(true,"✅ إجابة صحيحة! صحيتك 🌟");ua.push({q:q.q,u:q.o[ch],c:q.o[ca],ok:true,to:false});}else{wc++;toast(false,"❌ إجابة غالطة، ميسالش كمل!");reveal(q.o[ca]);ua.push({q:q.q,u:q.o[ch],c:q.o[ca],ok:false,to:false});}document.getElementById("scr").textContent=sc;document.getElementById("wrg").textContent=wc;showNxt(ci===cq.length-1);}
function toast(ok,msg){const f=document.getElementById("ft");f.className="ft "+(ok?"ok":"ko");document.getElementById("fi").className=ok?"fa-solid fa-circle-check":"fa-solid fa-circle-xmark";document.getElementById("fm").textContent=msg;}
function reveal(t){const r=document.getElementById("crv");r.className="cr show";document.getElementById("crt").textContent="الإجابة الصحيحة: "+t;}
function showNxt(last){const b=document.getElementById("nb");b.style.display="flex";document.getElementById("nbt").textContent=last?"عرض النتيجة":"السؤال التالي";}
function nextQ(){ci++;if(ci>=cq.length)result();else loadQ();}
function result(){
  clearInterval(ti);document.getElementById("pb").style.width="100%";
  document.getElementById("rsc").textContent=sc;document.getElementById("rwc").textContent=wc;document.getElementById("rtoc").textContent=toc;
  document.getElementById("sdisp").textContent=sc+"/20";
  const p=(sc/20)*100;let tit,gt,ic,gic;
  if(p>=90){tit="ممتاز! صحيتك 🏆";gt="درجة ممتازة – كمل تعلم راك في ثنية باهية!";ic="gg";gic="fa-trophy";}
  else if(p>=70){tit=" باهي برشا 👏";gt="درجة باهية برشا – أنت على الطريق الصحيح!";ic="sg";gic="fa-medal";}
  else if(p>=50){tit="جيد 🙂";gt="تنجم تعمل خير من هكا عاود وزيد ركز";ic="bg2";gic="fa-star-half-stroke";}
  else{tit=" زيد راجع شويا📚";gt="لا تيأس! راجع المادة وعاود المحاولة.";ic="lg";gic="fa-book-open";}
  document.getElementById("rtit").textContent=tit;document.getElementById("gtxt").textContent=gt;
  const iw=document.getElementById("riw");iw.className="riw "+ic;document.getElementById("ric").className="fa-solid "+gic;
  const l=document.getElementById("rvl");l.innerHTML="";
  ua.forEach((x,i)=>{const d=document.createElement("div");d.className="rvi "+(x.ok?"ci":"wi");let ah=x.ok?'<span class="rok"><i class="fa-solid fa-check"></i> إجابتك: '+x.u+' ✓</span>':x.to?'<span class="ru"><i class="fa-solid fa-clock"></i> انتهى الوقت</span><span class="rco"><i class="fa-solid fa-check"></i> الصحيح: '+x.c+'</span>':'<span class="ru"><i class="fa-solid fa-xmark"></i> إجابتك: '+x.u+'</span><span class="rco"><i class="fa-solid fa-check"></i> الصحيح: '+x.c+'</span>';d.innerHTML='<div class="rvq">'+(i+1)+'. '+x.q+'</div><div class="rva">'+ah+'</div>';l.appendChild(d);});
  show("sres");
}
function show(id){document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");window.scrollTo({top:0,behavior:"smooth"});}
function replay(){clearInterval(ti);startQuiz();}
startQuiz();
</script>
