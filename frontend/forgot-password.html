  <script>
    const API_URL = window.location.protocol === 'file:'
      ? 'http://localhost/projet_web_2026/backend'
      : 'backend';

    const form = document.getElementById('forgotPasswordForm');
    const emailInput = document.getElementById('email');
    const submitBtn = document.getElementById('submitBtn');
    const buttonText = document.getElementById('buttonText');
    const messageContainer = document.getElementById('messageContainer');

    function showMessage(type, message) {
      const color = type === 'success' ? '#1d6b4a' : '#b42318';
      messageContainer.innerHTML = `<p class="hint" style="color:${color};font-weight:600;margin-bottom:1rem;">${message}</p>`;
    }

    function clearMessage() {
      messageContainer.innerHTML = '';
    }

    function setButtonLoading(isLoading) {
      submitBtn.disabled = isLoading;
      if (isLoading) {
        buttonText.textContent = '???? ???????...';
      } else {
        buttonText.textContent = '????? ??? ?????????';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearMessage();

      const email = emailInput.value.trim();

      if (!email) {
        showMessage('error', '???? ????? ????? ??????????.');
        return;
      }

      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        showMessage('error', '?????? ?????????? ??? ????.');
        return;
      }

      setButtonLoading(true);

      try {
        const response = await fetch(`${API_URL}/forgot.php`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Accept': 'application/json',
          },
          body: JSON.stringify({ email, mode: 'code' }),
        });

        const raw = await response.text();
        let data = {};
        try {
          data = JSON.parse(raw);
        } catch (err) {
          data = { success: false, message: '??????? ??? ????? ?? ??????.' };
        }

        if (response.ok && data.success) {
          showMessage('success', data.message || '?? ????? ??? ????????? ?????.');

          setTimeout(() => {
            window.location.href = `reset-password.html?email=${encodeURIComponent(email)}`;
          }, 2000);
        } else {
          showMessage('error', data.message || '??? ???. ???? ?????.');
        }
      } catch (error) {
        showMessage('error', '???? ??????? ???????. ???? ?? ????? Apache/XAMPP ???? ?????? ??? http://localhost/projet_web_2026/');
      } finally {
        setButtonLoading(false);
      }
    });
  </script>
